<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pourquoi 99% des gens échouent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000000;
    overflow: hidden;
    cursor: none;
  }

  /* Scène fixe 1920x1080, mise à l'échelle pour tenir dans la fenêtre */
  #stage {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center center;
    background: #000000;
  }

  #canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 1080px;
  }

  /* ---------- Auras (dégradés radiaux : halos parfaitement ronds) ---------- */
  .aura {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }

  #aura1 {
    width: 760px;
    height: 760px;
    background: radial-gradient(circle,
      rgba(255,255,255,0.16) 0%,
      rgba(255,255,255,0.07) 26%,
      rgba(255,255,255,0.025) 45%,
      rgba(255,255,255,0) 68%);
  }

  #aura2 {
    width: 640px;
    height: 640px;
    background: radial-gradient(circle,
      rgba(255,255,255,0.30) 0%,
      rgba(255,255,255,0.13) 26%,
      rgba(255,255,255,0.05) 45%,
      rgba(255,255,255,0) 68%);
  }

  /* ---------- Sphère 1 (scènes 1 et 2) ---------- */
  #orb {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #ffffff;
    opacity: 0;
    overflow: hidden;
  }

  #orb .surface {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    background: radial-gradient(circle at 50% 44%,
      #ffffff 0%,
      #eef1f4 28%,
      #b9c2ca 50%,
      #5d666e 72%,
      #14171a 92%,
      #000000 100%);
  }

  /* Couche de rotation : très légères irrégularités décentrées,
     seules à révéler la rotation 3D lente de la sphère */
  #orb .spin {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    opacity: 0;
    background:
      radial-gradient(circle at 32% 60%, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0) 26%),
      radial-gradient(circle at 68% 30%, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 22%),
      radial-gradient(circle at 58% 74%, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 20%);
    animation: orbSpin 20s linear infinite;
  }

  @keyframes orbSpin {
    from { transform: rotate3d(0.15, 0.25, 1, 0deg); }
    to   { transform: rotate3d(0.15, 0.25, 1, 360deg); }
  }

  /* ---------- Sphère 2 (scènes 7 et 8) ---------- */
  #orb2wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 150px;
    height: 150px;
    opacity: 0;
    animation: tremble 1.1s ease-in-out infinite;
  }

  #orb2 {
    position: absolute;
    inset: 0;
    border-radius: 49.5% 50.5% 50% 50% / 50.5% 49% 51% 49.5%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 46%,
      #ffffff 0%,
      #ffffff 24%,
      #dfe6ea 46%,
      #8a949c 68%,
      #23282c 90%,
      #000000 100%);
    box-shadow:
      0 0 40px 6px rgba(255,255,255,0.45),
      0 0 90px 16px rgba(255,255,255,0.22);
    animation: morph 7s ease-in-out infinite;
  }

  #orb2 .spin {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 36% 62%, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0) 24%),
      radial-gradient(circle at 66% 32%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 22%);
    animation: orbSpin 26s linear infinite;
  }

  @keyframes tremble {
    0%   { transform: translate(-50%, -50%) translate(0px, 0px); }
    18%  { transform: translate(-50%, -50%) translate(1.1px, -0.7px); }
    39%  { transform: translate(-50%, -50%) translate(-0.9px, 0.8px); }
    57%  { transform: translate(-50%, -50%) translate(0.7px, 1.0px); }
    76%  { transform: translate(-50%, -50%) translate(-1.0px, -0.6px); }
    100% { transform: translate(-50%, -50%) translate(0px, 0px); }
  }

  @keyframes morph {
    0%   { border-radius: 49.5% 50.5% 50% 50% / 50.5% 49% 51% 49.5%; }
    33%  { border-radius: 50.5% 49.5% 49% 51% / 49.5% 50.5% 49.5% 50.5%; }
    66%  { border-radius: 49% 51% 50.5% 49.5% / 51% 49.5% 50% 50%; }
    100% { border-radius: 49.5% 50.5% 50% 50% / 50.5% 49% 51% 49.5%; }
  }

  #orb2wrap .aura { opacity: 1; }

  /* Immobilisation de la sphère (début scène 8) */
  #orb2wrap.frozen,
  #orb2wrap.frozen #orb2,
  #orb2wrap.frozen #orb2 .spin {
    animation-play-state: paused;
  }

  /* ---------- Textes ---------- */
  .txt {
    position: absolute;
    left: 0;
    width: 100%;
    text-align: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    color: #FFFFFF;
    letter-spacing: 0.02em;
    opacity: 0;
    pointer-events: none;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="canvas" width="1920" height="1080"></canvas>

  <div id="aura1" class="aura"></div>

  <div id="orb">
    <div class="surface"></div>
    <div class="spin"></div>
  </div>

  <div id="orb2wrap">
    <div id="aura2" class="aura"></div>
    <div id="orb2"><div class="spin"></div></div>
  </div>

  <div id="texts"></div>
</div>

<script>
(function () {
  'use strict';

  /* =========================================================
     CONSTANTES GÉNÉRALES
     ========================================================= */
  var W = 1920, H = 1080;
  var CX = W / 2, CY = H / 2;
  var END_TIME = 480;            // 8 minutes exactement

  // Bornes des scènes (secondes)
  var T_DOT    = 5;    // apparition du point
  var T_S2     = 30;   // point -> sphère
  var T_S3     = 90;   // fragmentation en 80 particules
  var T_S4     = 150;  // dérive brownienne, extinctions
  var T_S5     = 210;  // attraction vers l'icosaèdre
  var T_S6     = 300;  // dissolution de la structure
  var T_S7     = 390;  // rassemblement, seconde sphère
  var T_S8     = 450;  // immobilisation puis fondu au noir

  /* =========================================================
     RNG DÉTERMINISTE (rendu reproductible d'une prise à l'autre)
     ========================================================= */
  var seed = 990909;
  function rnd() {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  function rr(a, b) { return a + rnd() * (b - a); }

  function clamp01(v) { return v < 0 ? 0 : (v > 1 ? 1 : v); }
  function smooth(t) { t = clamp01(t); return t * t * (3 - 2 * t); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  /* =========================================================
     MISE À L'ÉCHELLE DE LA SCÈNE 1920x1080
     ========================================================= */
  var stage = document.getElementById('stage');
  function fit() {
    var s = Math.min(window.innerWidth / W, window.innerHeight / H);
    stage.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  fit();

  /* =========================================================
     CANVAS + SPRITE DE LUEUR POUR LES PARTICULES
     ========================================================= */
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');

  var glow = document.createElement('canvas');
  glow.width = glow.height = 64;
  (function () {
    var g = glow.getContext('2d');
    var grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
    grad.addColorStop(0, 'rgba(255,255,255,0.85)');
    grad.addColorStop(0.25, 'rgba(255,255,255,0.28)');
    grad.addColorStop(0.6, 'rgba(255,255,255,0.07)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, 64, 64);
  })();

  /* =========================================================
     ICOSAÈDRE — 12 sommets, 30 arêtes
     ========================================================= */
  var PHI = (1 + Math.sqrt(5)) / 2;
  var ICO_V = [
    [-1,  PHI, 0], [1,  PHI, 0], [-1, -PHI, 0], [1, -PHI, 0],
    [0, -1,  PHI], [0, 1,  PHI], [0, -1, -PHI], [0, 1, -PHI],
    [ PHI, 0, -1], [ PHI, 0, 1], [-PHI, 0, -1], [-PHI, 0, 1]
  ];
  (function () { // normalisation sur la sphère unité
    var n = Math.sqrt(1 + PHI * PHI);
    for (var i = 0; i < 12; i++) {
      ICO_V[i][0] /= n; ICO_V[i][1] /= n; ICO_V[i][2] /= n;
    }
  })();

  var ICO_E = [];
  (function () { // arêtes = paires de sommets à distance minimale
    var i, j, best = Infinity;
    function d2(a, b) {
      var dx = a[0]-b[0], dy = a[1]-b[1], dz = a[2]-b[2];
      return dx*dx + dy*dy + dz*dz;
    }
    for (i = 0; i < 12; i++) for (j = i+1; j < 12; j++) {
      var d = d2(ICO_V[i], ICO_V[j]);
      if (d < best - 1e-9) best = d;
    }
    for (i = 0; i < 12; i++) for (j = i+1; j < 12; j++) {
      if (d2(ICO_V[i], ICO_V[j]) < best + 1e-6) ICO_E.push([i, j]);
    }
  })();

  var ICO_R = 265;       // rayon projeté à l'écran
  var ICO_SPIN = 60;     // secondes par tour complet
  var TILT = 0.42;

  // Projection 2D d'un sommet à l'instant t (rotation lente continue)
  var projCache = { t: -1, pts: [] };
  function projectVerts(t) {
    if (projCache.t === t) return projCache.pts;
    var ry = (t - T_S5) * (Math.PI * 2 / ICO_SPIN);
    var cy = Math.cos(ry), sy = Math.sin(ry);
    var cx = Math.cos(TILT), sx = Math.sin(TILT);
    var pts = [];
    for (var i = 0; i < 12; i++) {
      var v = ICO_V[i];
      // rotation Y puis inclinaison X
      var x = v[0] * cy + v[2] * sy;
      var z = -v[0] * sy + v[2] * cy;
      var y = v[1] * cx - z * sx;
      var z2 = v[1] * sx + z * cx;
      var p = 1 / (1 - z2 * 0.16); // légère perspective
      pts.push([CX + x * ICO_R * p, CY + y * ICO_R * p, z2]);
    }
    projCache.t = t;
    projCache.pts = pts;
    return pts;
  }

  /* =========================================================
     PLANIFICATION DES ARÊTES (tracé scène 5, effacement scène 6)
     ========================================================= */
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rnd() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  var edges = [];
  (function () {
    var drawOrder = shuffle(ICO_E.map(function (_, i) { return i; }));
    var fadeOrder = shuffle(ICO_E.map(function (_, i) { return i; }));
    for (var i = 0; i < ICO_E.length; i++) {
      edges.push({
        a: ICO_E[i][0],
        b: ICO_E[i][1],
        drawStart: 236 + drawOrder[i] * (38 / (ICO_E.length - 1)), // 236 -> 274
        drawDur: 2.4,
        fadeStart: 302 + fadeOrder[i] * (48 / (ICO_E.length - 1)), // 302 -> 350
        fadeDur: 2.0
      });
    }
  })();

  /* =========================================================
     PARTICULES
     ========================================================= */
  var N_ALL = 80, N_KEEP = 40;
  var particles = [];
  var spawned = false;

  function spawnParticles() {
    spawned = true;
    var idx = shuffle(Array.apply(null, Array(N_ALL)).map(function (_, i) { return i; }));
    var survivors = {};
    for (var k = 0; k < N_KEEP; k++) survivors[idx[k]] = true;

    // Cibles scène 5 : 12 sommets + 28 milieux d'arêtes (parmi les 30)
    var edgePick = shuffle(edges.map(function (_, i) { return i; })).slice(0, N_KEEP - 12);
    var roles = [];
    for (var v = 0; v < 12; v++) roles.push({ kind: 'vertex', ref: v });
    for (var e = 0; e < edgePick.length; e++) roles.push({ kind: 'edge', ref: edgePick[e] });
    shuffle(roles);

    var sIdx = 0;
    for (var i = 0; i < N_ALL; i++) {
      var ang = rnd() * Math.PI * 2;
      var rad = Math.sqrt(rnd()) * 96;       // à l'intérieur de la sphère de 200px
      var isKeep = !!survivors[i];
      var p = {
        x: CX + Math.cos(ang) * rad,
        y: CY + Math.sin(ang) * rad,
        size: rr(2, 8),
        heading: ang + rr(-0.5, 0.5),        // départ globalement centrifuge
        speed: rr(16, 34),                   // vitesse initiale de fragmentation
        cruise: rr(3.5, 8.5),                // vitesse de croisière (dérive lente)
        curl: rr(-0.06, 0.06),               // courbure douce de trajectoire
        baseA: rr(0.55, 1),
        keep: isKeep,
        deathStart: isKeep ? Infinity : rr(105, 188),
        deathDur: 16,
        role: null,
        // scène 5/6
        capStart: rr(211, 217), capDur: rr(16, 21),
        release: Infinity, relDur: 6,
        // scène 7
        cap7Start: rr(391, 399), cap7Dur: rr(14, 18),
        tx7: 0, ty7: 0,
        fade7Start: rr(413, 418), fade7Dur: 13
      };
      if (isKeep) {
        p.role = roles[sIdx++];
        // point d'arrivée sur le disque de la sphère finale (150px => rayon 75)
        var a7 = rnd() * Math.PI * 2;
        var r7 = Math.sqrt(rnd()) * 71;
        p.tx7 = CX + Math.cos(a7) * r7;
        p.ty7 = CY + Math.sin(a7) * r7;
      }
      particles.push(p);
    }

    // Libération (scène 6) : après disparition des arêtes incidentes
    for (var q = 0; q < particles.length; q++) {
      var pp = particles[q];
      if (!pp.keep) continue;
      if (pp.role.kind === 'edge') {
        var ed = edges[pp.role.ref];
        pp.release = ed.fadeStart + ed.fadeDur + 0.5;
      } else {
        var latest = 0;
        for (var m = 0; m < edges.length; m++) {
          if (edges[m].a === pp.role.ref || edges[m].b === pp.role.ref) {
            latest = Math.max(latest, edges[m].fadeStart + edges[m].fadeDur);
          }
        }
        pp.release = latest + 0.9;
      }
    }
  }

  // Cible d'une particule sur la structure à l'instant t
  function structTarget(p, t) {
    var pts = projectVerts(t);
    if (p.role.kind === 'vertex') {
      var v = pts[p.role.ref];
      return [v[0], v[1]];
    }
    var ed = edges[p.role.ref];
    var a = pts[ed.a], b = pts[ed.b];
    return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
  }

  // Facteur d'accroche à la structure (0 = libre, 1 = en place)
  function bindStruct(p, t) {
    var rise = smooth((t - p.capStart) / p.capDur);
    var fall = 1 - smooth((t - p.release) / p.relDur);
    return Math.min(rise, fall);
  }

  function bindSphere2(p, t) {
    return smooth((t - p.cap7Start) / p.cap7Dur);
  }

  /* =========================================================
     SIMULATION (pas de temps fixe pour la dérive)
     ========================================================= */
  function stepParticles(t, dt) {
    if (!spawned && t >= T_S3 - 1) spawnParticles();
    if (!spawned) return;

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      var b5 = p.keep ? bindStruct(p, t) : 0;
      var b7 = p.keep ? bindSphere2(p, t) : 0;

      // Particule verrouillée : elle suit exactement sa cible
      if (b7 >= 1) { p.x = p.tx7; p.y = p.ty7; continue; }
      if (b5 >= 1 && b7 <= 0) {
        var tg = structTarget(p, t);
        p.x = tg[0]; p.y = tg[1];
        continue;
      }

      // Dérive brownienne : cap qui serpente, trajectoire courbe
      p.heading += p.curl * dt + (rnd() - 0.5) * 0.55 * dt;

      // Rappel très doux vers l'écran si la particule s'éloigne trop
      var ox = p.x - CX, oy = p.y - CY;
      var dist = Math.sqrt(ox * ox + oy * oy);
      if (dist > 620) {
        var back = Math.atan2(-oy, -ox);
        var diff = back - p.heading;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        p.heading += diff * Math.min(1, 0.9 * dt);
      }

      // Décélération douce vers la vitesse de croisière
      p.speed += (p.cruise - p.speed) * Math.min(1, 0.06 * dt * 8);

      p.x += Math.cos(p.heading) * p.speed * dt;
      p.y += Math.sin(p.heading) * p.speed * dt;

      // Attraction progressive vers la cible active
      if (b7 > 0) {
        p.x = lerp(p.x, p.tx7, b7 * Math.min(1, dt * 3.2));
        p.y = lerp(p.y, p.ty7, b7 * Math.min(1, dt * 3.2));
        if (b7 >= 1) { p.x = p.tx7; p.y = p.ty7; }
      } else if (b5 > 0) {
        var tgt = structTarget(p, t);
        p.x = lerp(p.x, tgt[0], b5 * Math.min(1, dt * 3.2));
        p.y = lerp(p.y, tgt[1], b5 * Math.min(1, dt * 3.2));
      }
    }
  }

  function particleAlpha(p, t) {
    var a = p.baseA;
    if (!p.keep) {
      a *= 1 - clamp01((t - p.deathStart) / p.deathDur);
    } else {
      a *= 1 - smooth((t - p.fade7Start) / p.fade7Dur); // absorption par la sphère 2
    }
    return a;
  }

  /* =========================================================
     RENDU CANVAS
     ========================================================= */
  function drawCanvas(t) {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    if (!spawned) return;

    // ----- Lignes de la structure (scènes 5 et 6) -----
    if (t >= 235 && t <= 356) {
      var pts = projectVerts(t);
      ctx.lineWidth = 1;
      for (var e = 0; e < edges.length; e++) {
        var ed = edges[e];
        var prog = clamp01((t - ed.drawStart) / ed.drawDur);   // tracé progressif
        if (prog <= 0) continue;
        var fade = 1 - clamp01((t - ed.fadeStart) / ed.fadeDur); // effacement
        if (fade <= 0) continue;
        var a = pts[ed.a], b = pts[ed.b];
        ctx.strokeStyle = 'rgba(255,255,255,' + (0.6 * fade).toFixed(3) + ')';
        ctx.beginPath();
        ctx.moveTo(a[0], a[1]);
        ctx.lineTo(a[0] + (b[0] - a[0]) * prog, a[1] + (b[1] - a[1]) * prog);
        ctx.stroke();
      }
    }

    // ----- Particules -----
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var alpha = particleAlpha(p, t);
      if (alpha <= 0.003) continue;

      var gs = p.size * 6; // halo
      ctx.globalAlpha = alpha * 0.5;
      ctx.drawImage(glow, p.x - gs / 2, p.y - gs / 2, gs, gs);

      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  /* =========================================================
     SPHÈRE 1 — point puis sphère tournante (DOM)
     ========================================================= */
  var orb = document.getElementById('orb');
  var orbSurface = orb.querySelector('.surface');
  var orbSpin = orb.querySelector('.spin');
  var aura1 = document.getElementById('aura1');

  function updateOrb(t) {
    if (t < T_DOT || t > T_S3 + 2) {
      orb.style.opacity = '0';
      aura1.style.opacity = '0';
      return;
    }

    var size, surf = 0;
    if (t < T_S2) {
      // Scène 1 : croissance linéaire ultra lente, 2px -> 40px
      size = 2 + (t - T_DOT) / (T_S2 - T_DOT) * 38;
    } else if (t < T_S2 + 9) {
      // Transition scène 2 : 40px -> 200px, la surface apparaît
      var k = smooth((t - T_S2) / 9);
      size = lerp(40, 200, k);
      surf = k;
    } else {
      size = 200;
      surf = 1;
    }

    // Fragmentation : la sphère s'efface pendant que les particules naissent
    var out = 1 - clamp01((t - (T_S3 - 1)) / 1.6);

    orb.style.opacity = String(out);
    orb.style.width = size + 'px';
    orb.style.height = size + 'px';
    orbSurface.style.opacity = String(surf);
    orbSpin.style.opacity = String(surf * 0.6);
    aura1.style.opacity = String(surf * out);

    if (surf < 1) {
      // Lueur diffuse du point (blanc, opacité 0.3)
      var blur = size * 0.7 + 6;
      var spread = size * 0.12 + 1;
      orb.style.boxShadow = '0 0 ' + blur.toFixed(1) + 'px ' + spread.toFixed(1) +
        'px rgba(255,255,255,0.3)';
    } else {
      // Aura de la sphère : couches proches en box-shadow,
      // halo lointain assuré par #aura1 (dégradé radial, parfaitement rond)
      orb.style.boxShadow =
        '0 0 30px 4px rgba(255,255,255,0.25),' +
        '0 0 70px 10px rgba(255,255,255,0.10)';
    }
  }

  /* =========================================================
     SPHÈRE 2 — plus petite, tremblante, lumineuse (DOM)
     ========================================================= */
  var orb2wrap = document.getElementById('orb2wrap');
  var frozen = false;

  function updateOrb2(t) {
    var a = smooth((t - 413) / 17);          // apparition pendant l'agrégation
    if (t >= T_S8 + 5) {
      a *= clamp01((END_TIME - t) / 25);     // fondu final : 25 s vers le noir
    }
    orb2wrap.style.opacity = String(a);

    if (t >= T_S8 && !frozen) {              // immobilisation totale à 7:30
      frozen = true;
      orb2wrap.classList.add('frozen');
    }
  }

  /* =========================================================
     TEXTES
     ========================================================= */
  var TEXTS = [
    { t: 5,   d: 8,  s: 24, m: "Il y a une vérité que tu connais déjà." },
    { t: 20,  d: 8,  s: 24, m: "Et que tu refuses de voir." },
    { t: 90,  d: 5,  s: 28, m: "Tu as un projet." },
    { t: 100, d: 5,  s: 22, m: "Depuis longtemps." },
    { t: 112, d: 6,  s: 22, m: "Et chaque soir tu te dis — demain." },
    { t: 125, d: 8,  s: 28, m: "Toujours demain.", italic: true },
    { t: 142, d: 8,  s: 32, m: "Le problème c'est toi." },
    { t: 180, d: 10, s: 20, m: "Nous souffrons plus dans notre imagination que dans la réalité." },
    { t: 195, d: 8,  s: 14, m: "— Sénèque", baseA: 0.6, dy: 60 },
    { t: 240, d: 15, s: 26, m: "L'inaction est la seule façon garantie d'échouer.", typewriter: true },
    { t: 330, d: 6,  s: 22, m: "Ce n'est pas la peur de l'échec." },
    { t: 342, d: 8,  s: 22, m: "C'est la peur de découvrir ce que tu vaux vraiment." },
    { t: 390, d: 5,  s: 24, m: "L'échec n'est pas la fin." },
    { t: 402, d: 8,  s: 32, m: "L'inaction l'est." },
    { t: 450, d: 8,  s: 28, m: "Pourquoi 99% des gens échouent." },
    { t: 465, d: 10, s: 20, m: "Parce qu'ils choisissent de ne pas commencer.", baseA: 0.8 }
  ];

  (function buildTexts() {
    var holder = document.getElementById('texts');
    for (var i = 0; i < TEXTS.length; i++) {
      var tx = TEXTS[i];
      var el = document.createElement('div');
      el.className = 'txt';
      el.style.fontSize = tx.s + 'px';
      el.style.top = (CY - tx.s * 0.75 + (tx.dy || 0)) + 'px';
      if (tx.italic) el.style.fontStyle = 'italic';
      if (tx.typewriter) {
        tx.spans = [];
        for (var c = 0; c < tx.m.length; c++) {
          var sp = document.createElement('span');
          sp.textContent = tx.m[c];
          sp.style.opacity = '0';
          sp.style.transition = 'opacity 0.16s linear';
          el.appendChild(sp);
          tx.spans.push(sp);
        }
      } else {
        el.textContent = tx.m;
      }
      holder.appendChild(el);
      tx.el = el;
    }
  })();

  function updateTexts(t) {
    for (var i = 0; i < TEXTS.length; i++) {
      var tx = TEXTS[i];
      var lt = t - tx.t; // temps local
      if (lt < -0.5 || lt > tx.d + 0.5) {
        tx.el.style.opacity = '0';
        continue;
      }
      // Fondu d'entrée 1 s, fondu de sortie 1 s
      var a = Math.min(clamp01(lt), clamp01(tx.d - lt));
      a *= (tx.baseA || 1);

      if (tx.typewriter) {
        // Apparition lettre par lettre — une lettre toutes les 80 ms
        var shown = lt <= 0 ? 0 : Math.floor(lt * 1000 / 80) + 1;
        for (var c = 0; c < tx.spans.length; c++) {
          tx.spans[c].style.opacity = c < shown ? '1' : '0';
        }
        // Le conteneur ne fait que le fondu de sortie
        tx.el.style.opacity = String(clamp01(tx.d - lt) * (tx.baseA || 1));
      } else {
        tx.el.style.opacity = String(a);
      }
    }
  }

  /* =========================================================
     TIMELINE — horloge unique depuis le chargement
     ========================================================= */
  var params = new URLSearchParams(location.search);
  var offset = parseFloat(params.get('t') || '0') || 0; // usage interne : ?t=secondes

  // Si on démarre avec un décalage, on rejoue la simulation à pas fixe
  if (offset > 0) {
    var st = 0, fixed = 1 / 30;
    while (st < offset) {
      st += fixed;
      stepParticles(st, fixed);
    }
  }

  var t0 = Date.now() - offset * 1000;
  var last = offset;
  var done = false;

  function frame() {
    var t = (Date.now() - t0) / 1000;
    var dt = Math.min(0.1, t - last);
    last = t;

    if (t <= END_TIME + 1) {
      stepParticles(t, dt);
      drawCanvas(t);
      updateOrb(t);
      updateOrb2(t);
      updateTexts(t);
    } else if (!done) {
      done = true; // fin : noir total et parfait, on fige tout
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, W, H);
      orb.style.opacity = '0';
      orb2wrap.style.opacity = '0';
      for (var i = 0; i < TEXTS.length; i++) TEXTS[i].el.style.opacity = '0';
      return;
    }
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>

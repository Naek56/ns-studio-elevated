  :root{
    --ease: cubic-bezier(.16,1,.3,1);   /* tous les mouvements — aucun rebond */
    --halo: 0 0 40px rgba(255,255,255,.05);
    --txtglow: 0 0 30px rgba(255,255,255,.10);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:#000; }
  body{
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; background:#000;
    -webkit-font-smoothing:antialiased; text-rendering:geometricPrecision;
  }

  /* ---------- 1080 x 1080 stage ---------- */
  .stage{
    position:relative; width:1080px; height:1080px; background:#000;
    overflow:hidden; transform-origin:center center;
  }
  .scene{ position:absolute; inset:0; color:#fff; }

  .act{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; pointer-events:none;
  }

  /* glow helpers (lueur blanche diffuse — strictement blanc) */
  .softglow{ text-shadow: var(--txtglow); }
  .halo{ box-shadow: var(--halo); }

  /* ====================== ACT 1 ====================== */
  #act1 .line{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    white-space:nowrap; font-family:'DM Mono', ui-monospace, monospace; font-weight:400;
  }
  #act1 .l1, #act1 .l2{ font-size:28px; letter-spacing:.03em; }
  #act1 .l3{ font-size:46px; letter-spacing:.01em; }

  .w{
    display:inline-block; opacity:0; transform:translateY(16px);
    transition: opacity .55s var(--ease), transform .7s var(--ease);
  }
  .w.in{ opacity:1; transform:none; }

  @keyframes wordPulse{ 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
  .w.pulse{ animation: wordPulse .4s var(--ease); }

  /* ====================== ACT 2 ====================== */
  #act2{ gap:26px; }
  .stat{
    font-family:'Cormorant Garamond', Garamond, 'Times New Roman', serif; font-weight:400;
    font-size:140px; line-height:1; opacity:0;
  }
  .stat.in{ transition: opacity .6s var(--ease); opacity:1; }
  @keyframes breathe{ 0%,100%{opacity:1} 50%{opacity:.6} }
  .stat.breathe{ animation: breathe 1.2s var(--ease) infinite; }

  .hline{
    width:520px; height:1px; background:#fff;
    transform:scaleX(0); transform-origin:left center;
    box-shadow: 0 0 12px rgba(255,255,255,.18);
  }
  .hline.draw{ transition: transform .8s var(--ease); transform:scaleX(1); }
  .hline.shrink{ transform-origin:center center; transition: transform .6s var(--ease); transform:scaleX(0); }

  .cap{
    font-family:'DM Mono', ui-monospace, monospace; font-size:13px;
    letter-spacing:.34em; text-indent:.34em; white-space:nowrap;
  }
  .ltr{
    display:inline-block; opacity:0; transform:translateY(7px);
    transition: opacity .26s var(--ease), transform .4s var(--ease);
  }
  .ltr.in{ opacity:1; transform:none; }

  /* ====================== ACT 3 ====================== */
  #act3 .sonar{
    position:absolute; left:50%; top:50%; width:0; height:0;
  }
  #act3 .ring{
    position:absolute; left:50%; top:50%; width:6px; height:6px;
    margin:-3px 0 0 -3px; border-radius:50%; background:#fff; opacity:0;
  }
  @keyframes sonar{ 0%{transform:scale(1); opacity:.85} 100%{transform:scale(4); opacity:0} }
  #act3 .ring.go{ animation: sonar .6s var(--ease) forwards; }

  .kairos{
    font-family:'Cormorant Garamond', Garamond, serif; font-weight:400;
    font-size:80px; line-height:1; opacity:0; transform:translateY(34px);
  }
  .kairos.in{ transition: opacity .7s var(--ease), transform .7s var(--ease); opacity:1; transform:none; }

  .ksub{
    margin-top:16px; font-family:'DM Mono', ui-monospace, monospace; font-size:14px;
    letter-spacing:.12em; opacity:0;
  }
  .ksub.in{ transition: opacity .5s var(--ease); opacity:.6; }

  .feats{
    margin-top:44px; display:flex; flex-direction:column; gap:15px; text-align:left;
  }
  .feat{
    font-family:'DM Mono', ui-monospace, monospace; font-size:12px; letter-spacing:.04em;
    opacity:0; transform:translateY(12px);
  }
  .feat.in{ transition: opacity .55s var(--ease), transform .7s var(--ease); opacity:.7; transform:none; }
  .feat .dash{ display:inline-block; width:1.5em; }

  /* ====================== ACT 4 ====================== */
  #act4 .logo{ display:flex; align-items:center; gap:32px; }
  .mark{ position:relative; width:160px; height:160px; flex:0 0 auto; }
  .ring-svg{ width:160px; height:160px; display:block; transform:rotate(-90deg); }
  .ring-svg circle{
    fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round;
    stroke-dasharray:439.82; stroke-dashoffset:439.82;
  }
  .ring-svg.draw circle{ transition: stroke-dashoffset 1s var(--ease); stroke-dashoffset:0; }
  .monoW{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Helvetica Neue', Arial, sans-serif; font-weight:700; font-size:62px; opacity:0;
  }
  .monoW.in{ transition: opacity .4s var(--ease); opacity:1; }

  .word{ display:flex; flex-direction:column; align-items:flex-start; }
  .way{
    font-family:'Helvetica Neue', Arial, sans-serif; font-weight:700; font-size:48px;
    letter-spacing:.02em; opacity:0; transform:translateX(40px);
  }
  .way.in{ transition: opacity .5s var(--ease), transform .5s var(--ease); opacity:1; transform:none; }
  .tag{
    margin-top:9px; font-family:'DM Mono', ui-monospace, monospace; font-size:11px;
    letter-spacing:.38em; text-indent:.38em; opacity:.6;
  }

  @keyframes logoBreath{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  .logo.breath{ animation: logoBreath .8s var(--ease); }

  /* general slow fade-out at the very end */
  .fade-slow{ transition: opacity 1.4s var(--ease) !important; opacity:0 !important; }

  /* ---------- Film grain (SVG feTurbulence) ---------- */
  .grain{
    position:fixed; inset:0; width:100vw; height:100vh;
    pointer-events:none; opacity:.03; mix-blend-mode:screen; z-index:9999;
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="scene" id="scene">

      <!-- ACT 1 : la douleur -->
      <section class="act" id="act1">
        <div class="line l1 softglow" id="l1"></div>
        <div class="line l2 softglow" id="l2"></div>
        <div class="line l3 softglow halo" id="l3"></div>
      </section>

      <!-- ACT 2 : la statistique -->
      <section class="act" id="act2">
        <div class="stat softglow halo" id="stat">97%</div>
        <div class="hline" id="hline"></div>
        <div class="cap" id="cap"></div>
      </section>

      <!-- ACT 3 : Kairos AI -->
      <section class="act" id="act3">
        <div class="sonar" id="sonar"><span class="ring"></span><span class="ring"></span></div>
        <div class="kairos softglow halo" id="kairos">Kairos</div>
        <div class="ksub" id="ksub"></div>
        <div class="feats" id="feats">
          <div class="feat"></div>
          <div class="feat"></div>
          <div class="feat"></div>
        </div>
      </section>

      <!-- ACT 4 : WAY Creative Agency -->
      <section class="act" id="act4">
        <div class="logo" id="logo">
          <div class="mark halo">
            <svg class="ring-svg" id="ring" viewBox="0 0 160 160" aria-hidden="true">
              <circle cx="80" cy="80" r="70"></circle>
            </svg>
            <span class="monoW" id="monoW">W</span>
          </div>
          <div class="word">
            <div class="way softglow" id="wayWord">WAY</div>
            <div class="tag" id="tag"></div>
          </div>
        </div>
      </section>

    </div><!-- /scene -->

    <!-- grain overlay -->
    <svg class="grain" id="grain" preserveAspectRatio="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="grainF" x="0" y="0" width="100%" height="100%">
          <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="2" stitchTiles="stitch"/>
          <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 0 1"/>
        </filter>
      </defs>
      <rect width="100%" height="100%" filter="url(#grainF)"></rect>
    </svg>
  </div>

<script>
(function(){
  "use strict";
  var byId = function(id){ return document.getElementById(id); };
  var stage = byId('stage');

  /* Fit the 1080² stage inside the viewport (preview only; coords stay 1080-based). */
  function fit(){
    var s = Math.min(1, Math.min(window.innerWidth, window.innerHeight) / 1080);
    stage.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit, {passive:true});
  fit();

  /* ---------- timeline helpers ---------- */
  var EASE = 'cubic-bezier(.16,1,.3,1)';
  function at(ms, fn){ setTimeout(fn, ms); }

  function buildWords(el, text){
    el.textContent = '';
    var words = text.split(' ');
    for (var i = 0; i < words.length; i++){
      var s = document.createElement('span');
      s.className = 'w';
      s.textContent = words[i];
      el.appendChild(s);
      if (i < words.length - 1) el.appendChild(document.createTextNode(' '));
    }
    return el.querySelectorAll('.w');
  }

  function buildLetters(el, text){
    el.textContent = '';
    for (var i = 0; i < text.length; i++){
      var ch = text.charAt(i);
      var s = document.createElement('span');
      s.className = 'ltr';
      s.textContent = (ch === ' ') ? ' ' : ch;
      el.appendChild(s);
    }
    return el.querySelectorAll('.ltr');
  }

  /* reveal a node list with a fixed per-item delay (relative to call time) */
  function revealSeq(nodes, step){
    for (var i = 0; i < nodes.length; i++){
      (function(n, d){ setTimeout(function(){ n.classList.add('in'); }, d); })(nodes[i], i * step);
    }
  }

  function fade(el, dur){
    el.style.transition = 'opacity ' + dur + 'ms ' + EASE;
    el.style.opacity = '0';
  }

  /* ---------- content ---------- */
  var l1 = buildWords(byId('l1'), 'Vous avez un site web');
  var l2 = buildWords(byId('l2'), 'Des visiteurs arrivent');
  var l3 = buildWords(byId('l3'), 'Mais personne n’achète'); // n'achète

  var cap = buildLetters(byId('cap'), 'DE VOS VISITEURS NE REVIENDRONT JAMAIS');

  byId('ksub').textContent = 'L’intelligence qui ne dort jamais';
  var featTxt = [
    'Analyse votre site en temps réel',
    'Comprend le comportement de vos visiteurs',
    'Vous dit exactement quoi faire pour vendre plus'
  ];
  var feats = byId('feats').querySelectorAll('.feat');
  for (var i = 0; i < feats.length; i++){
    var dash = document.createElement('span'); dash.className = 'dash'; dash.textContent = '—';
    feats[i].appendChild(dash);
    feats[i].appendChild(document.createTextNode(featTxt[i]));
  }

  var tag = buildLetters(byId('tag'), 'CREATIVE AGENCY');

  function sonarGo(){
    var rings = byId('sonar').querySelectorAll('.ring');
    for (var i = 0; i < rings.length; i++){
      (function(r, d){ setTimeout(function(){ r.classList.add('go'); }, d); })(rings[i], i * 200);
    }
  }

  /* ---------- film grain motion (~10fps seed shuffle) ---------- */
  var turb = byId('turb'), seed = 2;
  var grainTimer = setInterval(function(){
    seed = (seed % 91) + 1;
    if (turb) turb.setAttribute('seed', seed);
  }, 100);

  /* ====================================================================
     MASTER TIMELINE — starts once on load, plays a single time (30s)
     ==================================================================== */
  function run(){
    /* ---- ACT 1 : 0 → 10s ---- */
    at(1000, function(){ revealSeq(l1, 200); });                 // "Vous avez un site web"
    at(3300, function(){ fade(byId('l1'), 300); });
    at(3700, function(){ revealSeq(l2, 200); });                 // "Des visiteurs arrivent"
    at(5600, function(){ fade(byId('l2'), 300); });
    at(6000, function(){ revealSeq(l3, 200); });                 // "Mais personne n'achète"
    at(7100, function(){ l3[1].classList.add('pulse'); });       // "personne" pulse 1→1.06
    at(8200, function(){ fade(byId('l3'), 500); });

    /* ---- ACT 2 : 10 → 18s ---- */
    at(10000, function(){ byId('hline').classList.add('draw'); });   // ligne L→R 0.8s
    at(10500, function(){ byId('stat').classList.add('in'); });      // 97% fade-in 0.6s
    at(11150, function(){ revealSeq(cap, 30); });                    // caption lettre par lettre
    at(12400, function(){ byId('stat').classList.add('breathe'); }); // respiration opacity
    at(16200, function(){ byId('stat').classList.remove('breathe'); });
    at(16300, function(){
      fade(byId('stat'), 500);
      fade(byId('cap'), 500);
      byId('hline').classList.add('shrink');                         // ligne se rétrécit vers le centre
    });

    /* ---- ACT 3 : 18 → 26s ---- */
    at(18000, sonarGo);                                              // point sonar
    at(18350, function(){ byId('kairos').classList.add('in'); });    // "Kairos" depuis le bas 0.7s
    at(19200, function(){ byId('ksub').classList.add('in'); });      // sous-titre fade-in 0.5s
    at(20000, function(){ feats[0].classList.add('in'); });          // 3 lignes, 400ms d'écart
    at(20400, function(){ feats[1].classList.add('in'); });
    at(20800, function(){ feats[2].classList.add('in'); });
    at(24300, function(){ fade(byId('act3'), 500); });

    /* ---- ACT 4 : 25 → 30s ---- */
    at(25000, function(){ byId('ring').classList.add('draw'); });    // cercle stroke 1s
    at(25800, function(){ byId('monoW').classList.add('in'); });     // W fade-in 0.4s
    at(26200, function(){ byId('wayWord').classList.add('in'); });   // WAY slide depuis la droite
    at(26800, function(){ revealSeq(tag, 35); });                    // CREATIVE AGENCY lettre par lettre
    at(27700, function(){ byId('logo').classList.add('breath'); });  // scale 1→1.02
    at(28700, function(){                                            // fade-out général très lent
      byId('scene').classList.add('fade-slow');
      byId('grain').classList.add('fade-slow');
    });
    at(30200, function(){ clearInterval(grainTimer); });             // noir total — fin
  }

  /* start automatically once the embedded fonts are ready (plays a single time) */
  if (document.fonts && document.fonts.load){
    Promise.all([
      document.fonts.load('400 28px "DM Mono"'),
      document.fonts.load('400 140px "Cormorant Garamond"')
    ]).then(run, run);
  } else {
    window.addEventListener('load', run);
  }
})();
</script>
</body>
</html>
